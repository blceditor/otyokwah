quote: >-
  Even though I am only with them for six fast paced days, I am hopeful the Lord
  impacts them through Bible studies, through individual time, and everyday
  routine. Camp is like speed-dating with the brokenness of the world: there is
  little we can do, except put our trust fully in our Lord Jesus that he will
  restore the pain and suffering. The importance of camp is that I am not doing
  the work, but Jesus Christ is working and changing lives.
name: Marybeth T.
role: Staff Member
