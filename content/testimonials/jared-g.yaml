quote: >-
  I’ve been so blessed to be able to be a part of BLC for the past two summers.
  It has honestly been such a joy to work alongside all of the staff and pour
  into all the kids that come. God deeply refreshed and encouraged my soul this
  summer through all the people he placed in my life at BLC. I always walk away
  from BLC having a greater sense of what the body of Christ ought to look like
  as we strive to humbly and sacrificially love one another as Christ loved us
  and to proclaim, cherish and exalt Christ together.
name: Jared G.
role: Staff Member
