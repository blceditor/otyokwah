# Repository & Site Configuration
# SINGLE SOURCE OF TRUTH for all transferable configuration
#
# To change values:
# 1. Edit this file
# 2. Run: npm run generate:config
# 3. Commit the generated files
#
# Generated files:
# - lib/config/repository.ts (GitHub constants)
# - lib/config/site.ts (domain/URL constants)
# - tests/fixtures/config.ts (test fixtures)

# GitHub Repository Configuration
github:
  # Repository owner (GitHub username or organization)
  owner: blceditor
  # Repository name
  repo: bearlakecamp
  # Full repository path (owner/repo)
  full: blceditor/bearlakecamp
  # GitHub App slug for Keystatic CMS
  app_slug: bearlakecamp-cms
  # GitHub repository URL
  url: https://github.com/blceditor/bearlakecamp

# Site/Domain Configuration
site:
  # Production domain (without protocol)
  production_domain: www.bearlakecamp.com
  # Production URL (with protocol)
  production_url: https://www.bearlakecamp.com
  # Keystatic CMS URL
  keystatic_url: https://www.bearlakecamp.com/keystatic

# Contact Email Configuration
email:
  # General contact email
  contact: info@bearlakecamp.org
  # Camp registrar email
  registrar: registrar@bearlakecamp.com
  # Default contact (used in CMS defaults)
  default: ben@bearlakecamp.com

# Analytics Configuration
analytics:
  # Google Analytics 4 measurement ID
  ga4_measurement_id: "G-QF89BLRP5F"

# Branding Colors
branding:
  colors:
    # Brand blue
    primary: "#4A7A9E"
    # Forest green
    secondary: "#2F4F3D"
    # Warm brown
    accent: "#A07856"
    # Off-white background
    cream: "#F5F0E8"
    # Sandy tan
    sand: "#D4C5A9"
    # Stone grey
    stone: "#8B7D6B"
    # Dark bark brown
    bark: "#3D2E1F"

# Vercel Configuration (project-specific, not transferable)
# These stay as environment variables - not generated
# vercel:
#   project_id: (from VERCEL_PROJECT_ID env var)
#   org_id: (from VERCEL_ORG_ID env var)
